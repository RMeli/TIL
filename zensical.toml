[project]
site_name = "Rocco Meli's TIL"
site_url = "https://eth-cscs.github.io/"
site_description = "Rocco Meli's TIL"
site_author = "Rocco Meli"
copyright = "&copy; 2025 Rocco Meli"
repo_url = "https://github.com/RMeli/TIL"

nav = [
  {"TIL" = "index.md"},
  {"Containers" = "containers/containers.md"},
  {"Development" = [
  	"develop/cmake.md",
	  "develop/spack.md"
  ]},
  {"Editors" = [
    "editors/vscode.md"
  ]},
  {"HPC" = [
    "hpc/affinity.md",
    "hpc/cluster.md",
    "hpc/cuda.md",
    "hpc/mpi.md",
    "hpc/slurm.md"
  ]},
  {"git" = [
    "git/git.md",
    "git/github.md"
  ]},
  {"Linux" = [
    "linux/commands.md",
    "linux/config.md"
  ]},
  {"Networking" = [
    "networking/ssh.md"
  ]},
  {"Programming" = [
    "programming/bash.md",
    "programming/cpp.md",
    "programming/fortran.md",
    "programming/python.md"
  ]},
  {"Scientific Software" = [
    "sciapps/mdanalysis.md",
    "sciapps/openbabel.md",
    "sciapps/rdkit.md"
  ]}
]

extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

[project.theme]
language = "en"
font.text = "Roboto"
font.code = "Roboto Mono"
features = [
    "content.code.copy",
    "content.code.select",
    "content.action.edit",
    "navigation.indexes",
    "search.share",
    "navigation.instant",
    "navigation.tracking",
    "navigation.path",
    "navigation.top",
    "content.code.annotate"
]


[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# EXTENSIONS
[project.markdown_extensions.admonition]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = "⚓︎"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
line_spans = "__span"

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji" 
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]